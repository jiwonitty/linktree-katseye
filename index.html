<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="style.css">
  <title>KATSEYE</title>
</head>
<body>
  <div class="card">
    <div class="cover"></div>
    <div class="avatar"></div>
    <div class="info">
      <h1> KATSEYE </h1>
      <p>Welcome to KATSEYE world</p>
    </div>

    <div id="links-container" class="links"></div>

    <footer class="footer-links">
      <div class="social-icons">
        <a href="https://www.instagram.com/katseyeworld?igsh=MXF6aG01MDJuaDhxOA=="><span class="material-symbols-outlined">brand_family</span></a>
        <a href="http://googleusercontent.com/spotify.com/4"><span class="material-symbols-outlined">play_circle</span></a>
        <a href="javascript:void(0)" id="share-btn"><span class="material-symbols-outlined">share</span></a>
      </div>
      <p>© 2026 KATSEYE World. All rights reserved.</p>
    </footer>
  </div>

  <script>
    // FUNÇÃO PARA CARREGAR LINKS DO JSON
    async function carregarLinks() {
      try {
        const resposta = await fetch('links.json');
        const links = await resposta.json();
        const container = document.getElementById('links-container');
        container.innerHTML = ''; 

        links.forEach(link => {
          const classeDestaque = link.destaque ? 'highlight' : '';
          container.innerHTML += `
            <a href="${link.url}" class="link-item ${classeDestaque}">
              <div class="mini-cover" style="background-image:url('${link.imagem}');"></div>
              <span>${link.nome}</span>
              <span class="material-symbols-outlined">north_east</span>
            </a>
          `;
        });
      } catch (erro) {
        console.error("Erro ao carregar links:", erro);
      }
    }
    carregarLinks();

    // SCRIPT DO BOTÃO SHARE (MANTIDO)
    const shareBtn = document.getElementById('share-btn');
    shareBtn.addEventListener('click', async () => {
      if (navigator.share) {
        try {
          await navigator.share({
            title: 'KATSEYE World',
            text: 'Confira o Linktree oficial das KATSEYE!',
            url: window.location.href
          });
        } catch (err) { console.log(err); }
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copiado!');
      }
    });
  </script>
</body>
</html>
